<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Варіант G: Феміда у круглій рамці (стилізована апроксимація детального line-art).
       Композиція: ліва рука піднесена з вагами; права рука опущена з мечем; пов'язка; тога. -->

  <!-- Зовнішнє коло рамки -->
  <circle cx="50" cy="50" r="48" stroke="#ffffff" stroke-width="2" fill="none"/>
  <!-- Внутрішнє коло (подвійна рамка) -->
  <circle cx="50" cy="50" r="44" stroke="#ffffff" stroke-width="0.8" fill="none"/>

  <!-- Голова -->
  <ellipse cx="55" cy="22" rx="5" ry="6.5" fill="#ffffff"/>
  <!-- Пов'язка -->
  <rect x="49" y="20" width="12" height="2.5" fill="#dc3545"/>
  <!-- Волосся (хвилею за плечем) -->
  <path d="M60 19 Q67 26 65 38 L60 30 Z" fill="#ffffff"/>
  <!-- Шия -->
  <rect x="53" y="28" width="4" height="3" fill="#ffffff"/>

  <!-- Тога / тіло (трапеція) -->
  <path d="M44 90 L48 32 L62 32 L66 90 Z" fill="#ffffff"/>
  <!-- Складки тоги -->
  <line x1="55" y1="34" x2="55" y2="88" stroke="#0f1419" stroke-width="0.35" opacity="0.4"/>
  <line x1="50" y1="50" x2="50" y2="88" stroke="#0f1419" stroke-width="0.3" opacity="0.3"/>
  <line x1="60" y1="50" x2="60" y2="88" stroke="#0f1419" stroke-width="0.3" opacity="0.3"/>

  <!-- Ліва рука піднята вгору-вліво (виглядає за межі тіла) -->
  <line x1="48" y1="35" x2="28" y2="22" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="28" cy="22" r="1.8" fill="#ffffff"/>

  <!-- Ваги, що висять з лівої руки -->
  <line x1="28" y1="22" x2="28" y2="36" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="13" y1="36" x2="43" y2="36" stroke="#ffffff" stroke-width="1.4"/>
  <!-- Підвіси чаш -->
  <line x1="16" y1="36" x2="16" y2="48" stroke="#ffffff" stroke-width="0.6"/>
  <line x1="40" y1="36" x2="40" y2="48" stroke="#ffffff" stroke-width="0.6"/>
  <!-- Чаші -->
  <path d="M11 48 Q16 55 21 48 Z" fill="#dc3545"/>
  <path d="M35 48 Q40 55 45 48 Z" fill="#dc3545"/>

  <!-- Права рука опущена вниз-вправо -->
  <line x1="62" y1="35" x2="76" y2="62" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- Меч у правій руці (вертикальний клинок униз) -->
  <circle cx="76" cy="62" r="2" fill="#ffffff"/>
  <line x1="72" y1="62" x2="80" y2="62" stroke="#ffffff" stroke-width="2"/>
  <line x1="76" y1="64" x2="76" y2="86" stroke="#dc3545" stroke-width="2.2"/>
  <polygon points="76,89 74,84 78,84" fill="#dc3545"/>
</svg>
